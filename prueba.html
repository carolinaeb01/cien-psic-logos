<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juego de Estrés Universitario</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: #f0f0f0;
        }
        h1 {
            color: #333;
        }
        #stressMeter {
            width: 300px;
            height: 30px;
            border: 2px solid #333;
            margin: 20px auto;
            background: #ddd;
            border-radius: 5px;
            overflow: hidden;
        }
        #stressLevel {
            height: 100%;
            width: 0%;
            background: #ff4d4d;
            transition: width 0.5s;
        }
        .card {
            display: inline-block;
            width: 150px;
            height: 200px;
            background: #fff;
            border: 2px solid #333;
            margin: 10px;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s;
            padding: 10px;
        }
        .card:hover {
            transform: scale(1.05);
        }
        #message {
            margin-top: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>Juego de Estrés Universitario</h1>
    
    <div id="stressMeter">
        <div id="stressLevel"></div>
    </div>
    
    <div class="card" onclick="applyEvent('examen')">
        Examen sorpresa 📄
    </div>
    <div class="card" onclick="applyEvent('amigos')">
        Salida con amigos 🎉
    </div>
    <div class="card" onclick="applyEvent('tarea')">
        Entrega de tarea 📝
    </div>

    <div id="message"></div>

    <script>
        let stress = 0;

        function updateMeter() {
            let meter = document.getElementById('stressLevel');
            meter.style.width = stress * 10 + '%';
        }

        function applyEvent(event) {
            let message = "";
            switch(event) {
                case 'examen':
                    stress += 2;
                    message = "¡Examen sorpresa! Tu estrés aumenta. Recuerda respirar profundo.";
                    break;
                case 'amigos':
                    stress = Math.max(0, stress - 1);
                    message = "Salida con amigos 😊. Tu estrés disminuye.";
                    break;
                case 'tarea':
                    stress += 1;
                    message = "Entrega de tarea pendiente. Tu estrés aumenta ligeramente.";
                    break;
            }

            // Limitar estrés entre 0 y 10
            if(stress > 10) stress = 10;
            if(stress < 0) stress = 0;

            updateMeter();
            document.getElementById('message').textContent = message;
        }
    </script>
</body>
</html>
